<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Todo App{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom styles -->
    {% block extra_css %}{% endblock %}
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">My Todo App</h1>

            <!-- Navigation Links -->
            <div class="space-x-6 hidden md:flex">
                <a href="/" class="text-gray-700 hover:text-indigo-600">Home</a>
                <a href="/tasks" class="text-gray-700 hover:text-indigo-600">Tasks</a>
                <a href="/about" class="text-gray-700 hover:text-indigo-600">About</a>
                <a href="/contact" class="text-gray-700 hover:text-indigo-600">Contact</a>
            </div>

            <!-- Mobile Menu Button -->
            <button class="md:hidden text-gray-700">
                ☰
            </button>
        </div>
    </nav>

    <!-- FLASH MESSAGES -->
    <div class="max-w-7xl mx-auto px-4 mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-4 rounded-lg 
                    {% if message.tags == 'success' %}bg-green-100 text-green-800
                    {% elif message.tags == 'error' %}bg-red-100 text-red-800
                    {% else %}bg-blue-100 text-blue-800{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <!-- MAIN CONTENT -->
    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="bg-white shadow-inner mt-12">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-gray-600">
            <p class="text-sm">
                &copy; {{ year|default:"2026" }} My Todo App. All rights reserved.
            </p>
            
        </div>
    </footer>

    <!-- Scripts -->
    {% block extra_js %}{% endblock %}

</body>
</html>
