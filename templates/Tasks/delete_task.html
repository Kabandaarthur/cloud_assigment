{% extends "base.html" %}

{% block content %}
    <h2 class="text-2xl font-bold text-gray-900 mb-6">Delete Task</h2>

    <div class="bg-white p-6 rounded-lg shadow-md">
        <p class="text-gray-700 mb-4">Are you sure you want to delete the task "<strong>{{ task.title }}</strong>"?</p>

        <div class="bg-red-50 border border-red-200 rounded-md p-4 mb-6">
            <p class="text-red-800 text-sm">This action cannot be undone. The task will be permanently deleted.</p>
        </div>

        <form method="post" class="flex space-x-4">
            {% csrf_token %}
            <button type="submit" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                Yes, Delete Task
            </button>
            <a href="{% url 'task_list' %}" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">
                Cancel
            </a>
        </form>
    </div>
{% endblock %}
