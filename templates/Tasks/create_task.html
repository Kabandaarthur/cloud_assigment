{% extends "base.html" %}

{% block content %}
    <div class="max-w-2xl mx-auto">
        <div class="mb-6">
            <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2">Create New Task</h2>
            <p class="text-gray-600 text-sm sm:text-base">Add a new task to your todo list</p>
        </div>

        <form method="post" class="bg-white p-6 sm:p-8 rounded-lg shadow-md">
            {% csrf_token %}

            <div class="mb-6">
                <label for="title" class="block text-gray-700 font-semibold mb-2 text-sm sm:text-base">
                    Task Title <span class="text-red-500">*</span>
                </label>
                <input type="text"
                       id="title"
                       name="title"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm sm:text-base"
                       placeholder="Enter your task title..."
                       required>
            </div>

            <div class="mb-6">
                <label for="description" class="block text-gray-700 font-semibold mb-2 text-sm sm:text-base">
                    Description <span class="text-gray-500">(optional)</span>
                </label>
                <textarea id="description"
                          name="description"
                          rows="4"
                          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-vertical text-sm sm:text-base"
                          placeholder="Add more details about your task..."></textarea>
            </div>

            <div class="flex flex-col sm:flex-row gap-4">
                <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-colors text-sm sm:text-base">
                    📝 Create Task
                </button>
                <a href="{% url 'task_list' %}" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-colors text-center text-sm sm:text-base">
                    ← Back to Tasks
                </a>
            </div>
        </form>
    </div>
{% endblock %}
